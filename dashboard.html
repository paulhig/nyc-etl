<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — NYC 311 ETL</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  #map { height: 400px; border-radius: var(--radius); overflow: hidden; }
  .chart-wrap { position: relative; height: 260px; }
  .filter-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px; }
  .dl-row { display:flex; gap:8px; flex-wrap:wrap; }
  .leaflet-container { font-family: inherit; }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">NYC <span>311</span> ETL</a>
  <a href="ingest.html">Ingest</a>
  <a href="clean.html">Clean <span class="nav-badge" id="badge-raw"></span></a>
  <a href="dashboard.html" class="active">Dashboard <span class="nav-badge" id="badge-dash"></span></a>
</nav>

<div class="page">
  <div class="steps">
    <div class="step done"><div class="step-num">✓</div> Ingest</div>
    <div class="step-line"></div>
    <div class="step done"><div class="step-num">✓</div> Clean</div>
    <div class="step-line"></div>
    <div class="step active"><div class="step-num">3</div> Dashboard</div>
  </div>

  <div id="no-data" style="display:none">
    <div class="alert alert-warning">No clean data found. <a href="ingest.html" style="color:var(--warning);font-weight:500">Go to Ingest first →</a></div>
  </div>

  <div id="main" style="display:none">

    <!-- Header + export -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <div class="page-title" id="dash-title">Dashboard</div>
        <div class="page-sub" id="dash-sub"></div>
      </div>
      <div class="dl-row">
        <button class="btn" onclick="exportCSV()">↓ Export CSV</button>
        <button class="btn" onclick="exportJSON()">↓ Export JSON</button>
        <button class="btn btn-primary" onclick="saveAirtable()" id="at-btn">↑ Save to Airtable</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="card">
      <div class="card-title"><div class="icon">⊞</div> Filters</div>
      <div class="filter-bar">
        <div class="field">
          <label>Borough</label>
          <select id="f-borough" onchange="applyFilters()">
            <option value="">All boroughs</option>
          </select>
        </div>
        <div class="field">
          <label>Complaint type</label>
          <select id="f-complaint" onchange="applyFilters()">
            <option value="">All types</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status" onchange="applyFilters()">
            <option value="">All statuses</option>
          </select>
        </div>
        <div class="field">
          <label>Search</label>
          <input type="text" id="f-search" placeholder="Search any field…" oninput="applyFilters()">
        </div>
        <button class="btn" onclick="clearFilters()">Clear</button>
      </div>
      <div style="font-size:12px;color:var(--text2)" id="filter-count"></div>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- Charts row -->
    <div class="dash-grid" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title"><div class="icon">▦</div> Complaints by type (top 10)</div>
        <div class="chart-wrap"><canvas id="chart-bar"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><div class="icon">◎</div> Complaints by borough</div>
        <div class="chart-wrap"><canvas id="chart-donut"></canvas></div>
      </div>
    </div>

    <!-- Line chart -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><div class="icon">↗</div> Complaints over time (daily)</div>
      <div style="position:relative;height:200px"><canvas id="chart-line"></canvas></div>
    </div>

    <!-- Map -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><div class="icon">◉</div> Zip code map <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:4px">(circle size = complaint count)</span></div>
      <div id="map"></div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px" id="map-note"></div>
    </div>

    <!-- Data table -->
    <div class="card">
      <div class="card-title"><div class="icon">☰</div> Data table — <span id="table-count"></span> rows</div>
      <div class="table-wrap">
        <table id="data-table"></table>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap">
        <button class="btn" onclick="prevPage()" id="btn-prev">← Prev</button>
        <span style="font-size:12px;color:var(--text2)" id="page-info"></span>
        <button class="btn" onclick="nextPage()" id="btn-next">Next →</button>
      </div>
    </div>

  </div>
</div>

<!-- Airtable modal -->
<div id="at-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center">
  <div style="background:var(--surface);border-radius:var(--radius-lg);padding:24px;max-width:440px;width:90%;border:0.5px solid var(--border2)">
    <div style="font-size:15px;font-weight:600;margin-bottom:16px">Save to Airtable</div>
    <div class="field" style="margin-bottom:10px">
      <label>Personal Access Token</label>
      <input type="password" id="at-token" value="patY6NBplXoNFImHj.38510f58830f683b85ece47317e1c9c4c3e7db0e487a6ff356e761641881540f">
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>Base ID</label>
      <input type="text" id="at-base" value="app87ZRy0mgBmMAUS">
    </div>
    <div class="field" style="margin-bottom:16px">
      <label>Table name</label>
      <input type="text" id="at-table" value="311 Requests">
    </div>
    <div id="at-progress" style="display:none;margin-bottom:12px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px" id="at-status"></div>
      <div class="progress-wrap"><div class="progress-bar" id="at-bar" style="width:0%"></div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="doAirtableSave()" id="at-save-btn">Save</button>
      <button class="btn" onclick="closeATModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script>
  let allData = [], filtered = [], map = null;
  let barChart, donutChart, lineChart;
  let page = 0;
  const PAGE_SIZE = 50;

  // ── Chart colour palette ──────────────────────────────────
  const PALETTE = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d','#ea580c','#6366f1'];

  function init() {
    const data = App.loadClean();
    if (!data || !data.length) {
      document.getElementById('no-data').style.display = 'block';
      return;
    }
    allData = data;
    filtered = [...allData];
    document.getElementById('main').style.display = 'block';

    const meta = App.loadMeta() || {};
    document.getElementById('dash-sub').textContent =
      `${allData.length.toLocaleString()} clean records · fetched ${meta.fetchedAt ? App.fmtDate(meta.fetchedAt) : 'recently'}`;

    populateFilters();
    render();
  }

  function populateFilters() {
    const uniq = (field) => [...new Set(allData.map(r => r[field]).filter(Boolean))].sort();
    const fill = (id, vals) => {
      const el = document.getElementById(id);
      vals.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); });
    };
    fill('f-borough',   uniq('borough'));
    fill('f-complaint', uniq('complaint_type'));
    fill('f-status',    uniq('status'));
  }

  function applyFilters() {
    const borough   = document.getElementById('f-borough').value;
    const complaint = document.getElementById('f-complaint').value;
    const status    = document.getElementById('f-status').value;
    const search    = document.getElementById('f-search').value.toLowerCase();
    filtered = allData.filter(r => {
      if (borough   && r.borough       !== borough)   return false;
      if (complaint && r.complaint_type !== complaint) return false;
      if (status    && r.status        !== status)    return false;
      if (search) {
        const row = Object.values(r).join(' ').toLowerCase();
        if (!row.includes(search)) return false;
      }
      return true;
    });
    page = 0;
    document.getElementById('filter-count').textContent =
      `Showing ${filtered.length.toLocaleString()} of ${allData.length.toLocaleString()} rows`;
    render();
  }

  function clearFilters() {
    ['f-borough','f-complaint','f-status'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-search').value = '';
    applyFilters();
  }

  function render() {
    renderKPIs();
    renderBarChart();
    renderDonutChart();
    renderLineChart();
    renderMap();
    renderTable();
  }

  // ── KPIs ─────────────────────────────────────────────────
  function renderKPIs() {
    const total = filtered.length;
    const closed = filtered.filter(r => (r.status||'').toLowerCase().includes('closed')).length;
    const closedPct = total ? Math.round(closed / total * 100) : 0;
    const topComplaint = topValue(filtered, 'complaint_type');
    const topBorough   = topValue(filtered, 'borough');
    const uniqueZips   = new Set(filtered.map(r => r.incident_zip).filter(Boolean)).size;

    document.getElementById('kpi-grid').innerHTML = [
      kpi(App.fmt(total),         'Total records',        ''),
      kpi(`${closedPct}%`,        'Cases closed',         closedPct >= 70 ? 'up' : 'down', `${App.fmt(closed)} closed`),
      kpi(topComplaint || '—',    'Top complaint type',   ''),
      kpi(topBorough   || '—',    'Busiest borough',      ''),
      kpi(App.fmt(uniqueZips),    'Unique zip codes',     ''),
    ].join('');
  }

  function kpi(val, label, delta, sub) {
    return `<div class="kpi">
      <div class="kpi-value" style="font-size:${val.length > 12 ? '16px' : val.length > 8 ? '20px' : '28px'}">${val}</div>
      <div class="kpi-label">${label}</div>
      ${sub ? `<div class="kpi-delta ${delta}">${sub}</div>` : ''}
    </div>`;
  }

  function topValue(data, field) {
    const counts = {};
    data.forEach(r => { if (r[field]) counts[r[field]] = (counts[r[field]] || 0) + 1; });
    return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || null;
  }

  function countBy(data, field) {
    const counts = {};
    data.forEach(r => { if (r[field]) counts[r[field]] = (counts[r[field]] || 0) + 1; });
    return Object.entries(counts).sort((a,b) => b[1]-a[1]);
  }

  // ── Bar chart ─────────────────────────────────────────────
  function renderBarChart() {
    const entries = countBy(filtered, 'complaint_type').slice(0, 10);
    const labels  = entries.map(([k]) => k.length > 22 ? k.slice(0,20)+'…' : k);
    const values  = entries.map(([,v]) => v);
    const ctx = document.getElementById('chart-bar').getContext('2d');
    if (barChart) barChart.destroy();
    barChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: PALETTE[0], borderRadius: 4, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { size: 10 }, maxRotation: 35 }, grid: { display: false } },
          y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.05)' } }
        }
      }
    });
  }

  // ── Donut chart ───────────────────────────────────────────
  function renderDonutChart() {
    const entries = countBy(filtered, 'borough').slice(0, 8);
    const ctx = document.getElementById('chart-donut').getContext('2d');
    if (donutChart) donutChart.destroy();
    donutChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: entries.map(([k]) => k),
        datasets: [{ data: entries.map(([,v]) => v), backgroundColor: PALETTE, borderWidth: 2, borderColor: '#fff' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12 } } }
      }
    });
  }

  // ── Line chart ────────────────────────────────────────────
  function renderLineChart() {
    const byDay = {};
    filtered.forEach(r => {
      if (!r.created_date) return;
      const day = r.created_date.split('T')[0];
      if (day) byDay[day] = (byDay[day] || 0) + 1;
    });
    const sorted = Object.entries(byDay).sort((a,b) => a[0].localeCompare(b[0]));
    const ctx = document.getElementById('chart-line').getContext('2d');
    if (lineChart) lineChart.destroy();
    lineChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: sorted.map(([d]) => d),
        datasets: [{
          data: sorted.map(([,v]) => v),
          borderColor: PALETTE[0], backgroundColor: 'rgba(37,99,235,.08)',
          borderWidth: 1.5, pointRadius: sorted.length > 60 ? 0 : 3,
          fill: true, tension: 0.3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { size: 10 }, maxTicksLimit: 12 }, grid: { display: false } },
          y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.05)' } }
        }
      }
    });
  }

  // ── Map ───────────────────────────────────────────────────
  function renderMap() {
    if (!map) {
      map = L.map('map').setView([40.7128, -74.006], 11);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CartoDB', subdomains: 'abcd', maxZoom: 18
      }).addTo(map);
    }
    map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });

    // Group by zip
    const zipCounts = {};
    const zipCoords = {};
    filtered.forEach(r => {
      const zip = r.incident_zip;
      const lat = parseFloat(r.latitude), lng = parseFloat(r.longitude);
      if (!zip || isNaN(lat) || isNaN(lng)) return;
      zipCounts[zip] = (zipCounts[zip] || 0) + 1;
      if (!zipCoords[zip]) zipCoords[zip] = { lat: 0, lng: 0, n: 0 };
      zipCoords[zip].lat += lat; zipCoords[zip].lng += lng; zipCoords[zip].n++;
    });

    const counts = Object.values(zipCounts);
    const maxCount = Math.max(...counts, 1);

    Object.entries(zipCounts).forEach(([zip, count]) => {
      const c = zipCoords[zip];
      if (!c) return;
      const lat = c.lat / c.n, lng = c.lng / c.n;
      const r = 5 + (count / maxCount) * 25;
      const opacity = 0.35 + (count / maxCount) * 0.45;
      L.circleMarker([lat, lng], {
        radius: r, color: '#2563eb', fillColor: '#2563eb',
        fillOpacity: opacity, weight: 1
      }).bindPopup(`<strong>ZIP ${zip}</strong><br>${count.toLocaleString()} complaints`).addTo(map);
    });

    const shown = Object.keys(zipCounts).length;
    document.getElementById('map-note').textContent =
      `${shown} zip codes with ${filtered.length.toLocaleString()} total complaints plotted`;
  }

  // ── Data table ────────────────────────────────────────────
  function renderTable() {
    if (!filtered.length) {
      document.getElementById('data-table').innerHTML = '<tbody><tr><td style="color:var(--text3)">No rows</td></tr></tbody>';
      document.getElementById('table-count').textContent = '0';
      return;
    }
    const cols = Object.keys(filtered[0]);
    const start = page * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);
    const thead = `<thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>`;
    const tbody = `<tbody>${slice.map(r =>
      `<tr>${cols.map(c => `<td title="${r[c]||''}">${r[c] || '—'}</td>`).join('')}</tr>`
    ).join('')}</tbody>`;
    document.getElementById('data-table').innerHTML = thead + tbody;
    document.getElementById('table-count').textContent = filtered.length.toLocaleString();
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    document.getElementById('page-info').textContent = `Page ${page+1} of ${totalPages}`;
    document.getElementById('btn-prev').disabled = page === 0;
    document.getElementById('btn-next').disabled = page >= totalPages - 1;
  }

  function prevPage() { if (page > 0) { page--; renderTable(); } }
  function nextPage() { if ((page+1) * PAGE_SIZE < filtered.length) { page++; renderTable(); } }

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    if (!filtered.length) return;
    const cols = Object.keys(filtered[0]);
    const rows = [cols.join(','), ...filtered.map(r => cols.map(c => `"${(r[c]||'').toString().replace(/"/g,'""')}"`).join(','))];
    download('311_clean.csv', rows.join('\n'), 'text/csv');
  }

  function exportJSON() {
    download('311_clean.json', JSON.stringify(filtered, null, 2), 'application/json');
  }

  function download(name, content, type) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type }));
    a.download = name;
    a.click();
  }

  // ── Airtable save ─────────────────────────────────────────
  function saveAirtable() {
    document.getElementById('at-modal').style.display = 'flex';
  }
  function closeATModal() {
    document.getElementById('at-modal').style.display = 'none';
  }

  async function doAirtableSave() {
    const token = document.getElementById('at-token').value.trim();
    const base  = document.getElementById('at-base').value.trim();
    const table = document.getElementById('at-table').value.trim();
    if (!token || !base || !table) { alert('Please fill in all fields'); return; }

    const btn = document.getElementById('at-save-btn');
    btn.disabled = true;
    document.getElementById('at-progress').style.display = 'block';

    const BATCH = 10;
    const cols  = Object.keys(filtered[0]);
    let saved = 0, errors = 0;

    const setStatus = (msg) => document.getElementById('at-status').textContent = msg;
    const setBar    = (pct) => document.getElementById('at-bar').style.width = pct + '%';

    for (let i = 0; i < filtered.length; i += BATCH) {
      const batch = filtered.slice(i, i + BATCH);
      const records = batch.map(r => {
        const fields = {};
        cols.forEach(c => { if (r[c]) fields[c] = r[c]; });
        return { fields };
      });
      try {
        const res = await fetch(`https://api.airtable.com/v0/${base}/${encodeURIComponent(table)}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ records, typecast: true })
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || res.status); }
        saved += batch.length;
      } catch(e) {
        errors++;
        console.warn('Batch error:', e);
        if (errors > 3) { setStatus(`Too many errors: ${e.message}`); btn.disabled = false; return; }
      }
      const pct = Math.round((i + BATCH) / filtered.length * 100);
      setBar(Math.min(pct, 100));
      setStatus(`Saved ${saved.toLocaleString()} / ${filtered.length.toLocaleString()} rows…`);
      await new Promise(r => setTimeout(r, 250)); // rate limit
    }

    setStatus(`Done — ${saved.toLocaleString()} rows saved${errors ? `, ${errors} batch errors` : ''}`);
    setBar(100);
    btn.disabled = false;
  }

  init();
</script>
</body>
</html>
